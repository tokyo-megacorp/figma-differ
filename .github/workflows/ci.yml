name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
      - name: MCP server health check
        run: |
          node -e "
          const { spawn } = require('child_process');
          const proc = spawn('node', ['scripts/mcp-server.mjs'], { stdio: ['pipe','pipe','pipe'] });
          let buf = '';
          proc.stdout.on('data', d => { buf += d.toString(); });
          proc.stdin.write(JSON.stringify({jsonrpc:'2.0',id:1,method:'initialize',params:{protocolVersion:'2024-11-05',capabilities:{},clientInfo:{name:'ci',version:'0.1'}}}) + '\n');
          proc.stdin.write(JSON.stringify({jsonrpc:'2.0',method:'notifications/initialized'}) + '\n');
          proc.stdin.write(JSON.stringify({jsonrpc:'2.0',id:2,method:'tools/list'}) + '\n');
          setTimeout(() => {
            proc.kill();
            const lines = buf.trim().split('\n').filter(Boolean);
            // F3 fix: find response by id match, not last-line assumption
            const toolsLine = lines.find(l => l.includes('\"id\":2') || l.includes('\"id\": 2'));
            if (!toolsLine) { console.error('No tools/list response found'); process.exit(1); }
            const toolsResp = JSON.parse(toolsLine);
            const names = toolsResp.result.tools.map(t => t.name).sort();
            const expected = ['get_flows','get_frame','list_frames','save','search'];
            if (JSON.stringify(names) !== JSON.stringify(expected)) {
              console.error('Expected tools:', expected, 'Got:', names);
              process.exit(1);
            }
            console.log('MCP server OK: 5 tools verified (' + names.join(', ') + ')');
          }, 3000);
          "

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:unit
      - run: npm run test:e2e
      # Shell tests are best-effort in CI:
      # - figma-api.test.sh, test-api.test.sh: require FIGMA_TOKEN env var
      # - Tests skip gracefully if QMD is not installed
      # - hooks.test.sh, diff-all.test.sh, benchmark.test.sh: local-only, no secrets needed
      - name: Shell tests (best-effort)
        run: npm run test:shell || echo "Some shell tests skipped (missing FIGMA_TOKEN or QMD)"
